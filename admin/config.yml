backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "pages"
    label: "Website Pages"
    files:
      - file: "index.html"
        label: "Home"
        name: "home"
        fields:
          - {label: "Page HTML", name: "body", widget: "code", output_code_only: true, default_language: "html"}
      - file: "about.html"
        label: "About"
        name: "about"
        fields:
          - {label: "Page HTML", name: "body", widget: "code", output_code_only: true, default_language: "html"}
      - file: "custom-homes.html"
        label: "Custom Homes"
        name: "custom_homes"
        fields:
          - {label: "Page HTML", name: "body", widget: "code", output_code_only: true, default_language: "html"}
      - file: "renovations.html"
