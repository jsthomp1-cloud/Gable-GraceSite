          - {label: "Page HTML", name: "body", widget: "code", output_code_only: true, default_language: "html"}
      - file: "process.html"
        label: "Process"
        name: "process"
        fields:
          - {label: "Page HTML", name: "body", widget: "code", output_code_only: true, default_language: "html"}
      - file: "blog.html"
        label: "Journal / Blog"
        name: "blog"
        fields:
          - {label: "Page HTML", name: "body", widget: "code", output_code_only: true, default_language: "html"}
      - file: "contact.html"
        label: "Contact"
